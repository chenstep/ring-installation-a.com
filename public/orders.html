<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2, minimum-scale=1, shrink-to-fit=no">
<title>Your Orders - Amazon.com</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23232f3e'/><path d='M6 22c4 3 10 4 16 1' stroke='%23ff9900' stroke-width='2.5' fill='none' stroke-linecap='round'/><path d='M19 18l3.5 5.5L26 20' stroke='%23ff9900' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="stylesheet" href="css/amazon.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div id="header-host"></div>

<h1 class="orders-title">Your Orders</h1>

<div class="orders-filter-row">
    <input type="text" class="orders-search" placeholder="Search all orders">
    <button class="orders-filter">Filter <span style="font-size:13px;">&rsaquo;</span></button>
</div>


<section class="orders-card">
    <h3>Your savings this year <span style="font-size:22px;">🎁</span></h3>
    <div class="orders-savings">
        <div class="orders-savings-pill"><b>$206</b> with Prime</div>
        <div class="orders-savings-pill"><b>16</b> hours saved</div>
    </div>
</section>

<section class="orders-card">
    <h3>Buy again <a href="#">See more</a></h3>
    <div style="display:flex; gap:12px; overflow-x:auto;">
        <div style="flex:0 0 90px;"><div style="width:90px;height:90px;background:#f2f2f2;border-radius:8px;"></div></div>
        <div style="flex:0 0 90px;"><div style="width:90px;height:90px;background:#f2f2f2;border-radius:8px;"></div></div>
        <div style="flex:0 0 90px;"><div style="width:90px;height:90px;background:#f2f2f2;border-radius:8px;"></div></div>
        <div style="flex:0 0 90px;"><div style="width:90px;height:90px;background:#f2f2f2;border-radius:8px;"></div></div>
    </div>
</section>

<section class="orders-card">
    <h3>Purchase history <span style="font-size:13px; color:var(--c-text-secondary); font-weight:400;">Past three months</span></h3>

    <a href="/gp/your-account/order-details?item=install" class="purchase-history-card">
        <img src="assets/hellotech-logo.png" alt="HelloTech">
        <div>
            <div class="ph-name" id="orders-install-name">Professional Installation by HelloTech (1 Camera)</div>
            <div class="ph-sub">Scheduling sent by e-mail once order ships</div>
        </div>
    </a>

    <a href="/gp/your-account/order-details?item=device" class="purchase-history-card">
        <img src="images/ring-product-hero.jpg" alt="Ring Floodlight">
        <div>
            <div class="ph-name" id="orders-device-name">Ring Floodlight Cam Pro</div>
            <div class="ph-sub">Arriving May 7, 2026</div>
        </div>
    </a>
</section>

<div style="padding: 60px 14px;"></div>

<script src="js/shared.js"></script>
<script>
(function () {
    Ring.renderHeader('#header-host', { cartCount: 0 });
    var state = Ring.readState();
    var sizeLabels = {1:'1 Camera',2:'2 Cameras',3:'3 Cameras'};
    var packLabel = {1:'', 2:' (2-Pack)', 3:' (3-Pack)'}[state.device.size] || '';
    var el = document.getElementById('orders-install-name');
    if (el) el.textContent = 'Professional Installation by HelloTech (' + (sizeLabels[state.install.cameras || state.device.size] || '1 Camera') + ')';
    var devEl = document.getElementById('orders-device-name');
    if (devEl) devEl.textContent = 'Ring Floodlight Cam Pro' + packLabel;
})();
</script>
</body>
</html>
